<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賽程 — 大安ㄍㄤㄍㄤ好籃球聯盟</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Anton&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared-styles.css?v=202603011254">
</head>
<body>

<nav id="top-nav"></nav>
<nav class="bottom-nav" id="bottom-nav"></nav>

<div class="wrap">
  <!-- HERO（動態渲染） -->
  <div class="sched-hero" id="sched-hero">
    <div id="sched-hero-content">
      <!-- 由 page-schedule.js 動態填入 -->
    </div>
  </div>

  <!-- 週次切換 -->
  <div class="week-nav">
    <button id="btn-prev-week" class="wbtn">← 前一週</button>
    <div id="wk-label" class="wk-lbl"></div>
    <button id="btn-next-week" class="wbtn">下一週 →</button>
  </div>

  <!-- 停賽提示（預設隱藏） -->
  <div id="sched-suspended" style="display:none"></div>

  <!-- 對戰組合 / 賽程順序 toggle -->
  <div class="sched-view-toggle" id="sched-view-toggle">
    <button id="btn-matchup" class="sched-toggle-btn active-toggle">對戰組合</button>
    <button id="btn-order"   class="sched-toggle-btn">賽程順序</button>
  </div>

  <!-- ── 對戰組合 view ── -->
  <div id="view-matchup">
    <div class="matchup-grid" id="sched-matchup-grid">
      <!-- 由 page-schedule.js 動態渲染 -->
    </div>
    <div id="matchup-hint" style="margin-top:.5rem;padding:.4rem .7rem;background:var(--warm1);border-radius:var(--r-sm);font-family:var(--font-cond);font-size:.72rem;color:var(--txt-light)">
      ℹ️ 對戰組合週初確定 · 本週場次順序尚未公告，請留意管理員通知
    </div>
  </div>

  <!-- ── 賽程順序 view ── -->
  <div id="view-order" style="display:none">
    <div id="sched-games">
      <!-- 由 page-schedule.js 動態渲染 -->
    </div>
    <div style="margin-top:.6rem;padding:.4rem .7rem;background:var(--warm1);border-radius:var(--r-sm);font-family:var(--font-cond);font-size:.72rem;color:var(--txt-light)">
      ℹ️ 每場間隔 30 分鐘 · 第一場時間依場地公告為準
    </div>
  </div><!-- /view-order -->

</div>

<script src="shared-app.js?v=202603011254"></script>
<script src="js/mock-data.js?v=202603011254"></script>
<script src="js/api.js?v=202603011254"></script>
<script src="js/page-schedule.js?v=202603011254"></script>
<script>document.addEventListener('DOMContentLoaded', loadSchedule);</script>
</body>
</html>
