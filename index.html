<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首頁 — 大安ㄍㄤㄍㄤ好籃球聯盟</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Anton&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared-styles.css">
</head>
<body>

<!-- NAV (auto-generated by shared-app.js) -->
<nav id="top-nav"></nav>
<nav class="bottom-nav" id="bottom-nav"></nav>

<div class="wrap" style="padding-top:1.5rem">

  <!-- ①── 本週賽程 ── -->
  <section class="home-section">
    <div class="sched-title-block" id="home-sched-header">
      <!-- 由 page-home.js 動態渲染 -->
    </div>

    <!-- 對戰組合 -->
    <div id="sched-matchup">
      <div class="game-grid" id="home-matchup-grid">
        <!-- 由 page-schedule.js 動態渲染 -->
      </div>
    </div>

    <!-- 賽程順序 -->
    <div id="sched-order" style="display:none">
      <div class="game-grid" id="home-order-grid">
        <!-- 由 page-schedule.js 動態渲染 -->
      </div>
      <div id="home-order-hint" style="display:none;margin-top:.6rem;padding:.4rem .7rem;background:var(--warm1);border-radius:var(--r-sm);font-family:var(--font-cond);font-size:.72rem;color:var(--txt-light)">
        ℹ️ 每場間隔 30 分鐘 · 第一場時間依場地公告為準 · 賽程順序每週四由管理員公告
      </div>
    </div>
  </section>

  <!-- ②── 球隊當前戰績 ── -->
  <section class="home-section" id="home-standings">
    <!-- 由 page-home.js 動態渲染 -->
  </section>

  <!-- ③④── 龍虎榜 + 數據榜 並排 ── -->
  <div class="home-bottom-grid">
    <section class="home-section" style="margin-bottom:0" id="home-dragon">
      <!-- 由 page-home.js 動態渲染 -->
    </section>
    <section class="home-section" style="margin-bottom:0" id="home-stats">
      <!-- 由 page-home.js 動態渲染 -->
    </section>
  </div>

</div>

<script src="shared-app.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/api.js"></script>
<script src="js/page-schedule.js"></script>
<script src="js/page-home.js"></script>
<script>document.addEventListener('DOMContentLoaded', loadSchedule);</script>
</body>
</html>
