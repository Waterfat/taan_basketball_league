<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球員名單 — 大安ㄍㄤㄍㄤ好籃球聯盟</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Anton&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared-styles.css">
</head>
<body>

<nav id="top-nav"></nav>
<nav class="bottom-nav" id="bottom-nav"></nav>

<div class="wrap">

  <!-- Hero -->
  <div class="roster-hero">
    <h2>球員名單</h2>
    <p>第 25 屆 · 六隊名單 · 本季出席紀錄</p>
  </div>

  <!-- Legend -->
  <div class="roster-legend">
    <span style="font-weight:800;color:var(--txt-dark)">出席符號說明</span>
    <span class="leg-item"><span class="att-cell att-1">1</span>出席</span>
    <span class="leg-item"><span class="att-cell att-0">0</span>請假</span>
    <span class="leg-item"><span class="att-cell att-x">✕</span>曠賽</span>
    <span class="leg-item"><span class="att-cell att-q">?</span>尚未舉行</span>
  </div>

  <!-- Team filter -->
  <div class="team-filter" id="team-filter">
    <div class="tf-chip active" data-team="all" onclick="filterTeam(this,'all')" style="border-color:var(--orange);color:var(--orange)">全部隊伍</div>
    <div class="tf-chip" data-team="red"    onclick="filterTeam(this,'red')"    style="--tc:#e53935"><span class="tf-dot" style="background:#e53935"></span>紅隊</div>
    <div class="tf-chip" data-team="black"  onclick="filterTeam(this,'black')"  style="--tc:#4a4a4a"><span class="tf-dot" style="background:#4a4a4a"></span>黑隊</div>
    <div class="tf-chip" data-team="blue"   onclick="filterTeam(this,'blue')"   style="--tc:#1976d2"><span class="tf-dot" style="background:#1976d2"></span>藍隊</div>
    <div class="tf-chip" data-team="green"  onclick="filterTeam(this,'green')"  style="--tc:#2e7d32"><span class="tf-dot" style="background:#2e7d32"></span>綠隊</div>
    <div class="tf-chip" data-team="yellow" onclick="filterTeam(this,'yellow')" style="--tc:#b38f00"><span class="tf-dot" style="background:#e6b800"></span>黃隊</div>
    <div class="tf-chip" data-team="white"  onclick="filterTeam(this,'white')"  style="--tc:#9e9e9e"><span class="tf-dot" style="background:#9e9e9e"></span>白隊</div>
  </div>

  <!-- Team Blocks (generated by JS) -->
  <div id="roster-list"></div>

</div>

<script src="shared-app.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/api.js"></script>
<script src="js/page-roster.js"></script>
</body>
</html>
